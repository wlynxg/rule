name: Build and Release Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build rule files
        run: |
          mkdir -p /tmp/dist

          for category in direct proxy reject; do
            src="sources/${category}.txt"
            outfile="/tmp/dist/${category}.list"
            true > "$outfile"
            if [ -f "$src" ]; then
              grep -v '^#' "$src" | grep -v '^$' | sed 's/^\*\.//' | sort -u | while read -r domain; do
                echo "DOMAIN-SUFFIX,$domain"
              done >> "$outfile"
            fi
            echo "=== ${category}.list ==="
            cat "$outfile"
          done

      - name: Commit to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          cp /tmp/dist/*.list ./
          git add *.list
          git commit -m "release: $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push -f origin release
