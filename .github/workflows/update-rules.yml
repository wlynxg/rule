name: Deploy Clash Rules

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 自动运行

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Clash rules
        run: python scripts/generate.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
