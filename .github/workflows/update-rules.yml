name: Build and Release Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate merged rule file
        run: |
          mkdir -p output

          merge_sources() {
            local section_name="$1"
            local header="$2"
            shift 2
            echo ""
            echo "## ${header}"
            echo ""
            for f in "$@"; do
              if [ -f "$f" ]; then
                grep -v '^#' "$f" | grep -v '^$'
              fi
            done | sort -u
          }

          # Generate clash ruleset with all rules
          {
            echo "# Clash Rule Provider - Auto Generated"
            echo "# $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
            echo "# Source: https://github.com/wlynxg/rule"
            echo ""
            echo "payload:"

            # Proxy rules
            if [ -f sources/proxy.txt ]; then
              proxy=$(grep -v '^#' sources/proxy.txt | grep -v '^$' | sort -u)
              if [ -n "$proxy" ]; then
                echo "  # === Proxy ==="
                while IFS= read -r domain; do
                  echo "  - DOMAIN-SUFFIX,${domain}"
                done <<< "$proxy"
              fi
            fi

            # Direct rules
            if [ -f sources/direct.txt ]; then
              direct=$(grep -v '^#' sources/direct.txt | grep -v '^$' | sort -u)
              if [ -n "$direct" ]; then
                echo "  # === Direct ==="
                while IFS= read -r domain; do
                  echo "  - DOMAIN-SUFFIX,${domain}"
                done <<< "$direct"
              fi
            fi

            # Reject rules
            if [ -f sources/reject.txt ]; then
              reject=$(grep -v '^#' sources/reject.txt | grep -v '^$' | sort -u)
              if [ -n "$reject" ]; then
                echo "  # === Reject ==="
                while IFS= read -r domain; do
                  echo "  - DOMAIN-SUFFIX,${domain}"
                done <<< "$reject"
              fi
            fi
          } > output/rules.yaml

          echo "=== Generated ==="
          cat output/rules.yaml

      - name: Commit to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          cp output/* .
          git add .
          git commit -m "release: $(date -u +%Y%m%d-%H%M%S)"
          git push -f origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Rules
          make_latest: true
          files: output/*
