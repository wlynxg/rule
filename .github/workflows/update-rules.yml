name: Build and Release Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build single rule file
        run: |
          OUTFILE=/tmp/rule.yaml
          {
            echo "# Clash Rule Provider - Auto Generated"
            echo "# $(date -u '+%Y-%m-%d %H:%M:%S') UTC"
            echo "# Source: https://github.com/${{ github.repository }}"
            for f in sources/*.txt; do
              grep -v '^#' "$f" | grep -v '^$' | sort -u | while read -r domain; do
                if [[ "$domain" == \** ]]; then
                  echo "DOMAIN-SUFFIX,${domain#\*}"
                else
                  echo "DOMAIN-SUFFIX,$domain"
                fi
              done
            done
          } > "$OUTFILE"

          echo "=== Generated rule.yaml ==="
          cat "$OUTFILE"

      - name: Commit to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          cp /tmp/rule.yaml ./rule.yaml
          git add rule.yaml
          git commit -m "release: $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push -f origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Rules
          make_latest: true
          files: /tmp/rule.yaml
