name: Build and Release Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate unified rule.yaml
        run: |
          TAG=$(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)
          {
            echo "# Clash Rule Provider - Auto Generated"
            echo "# $TAG"
            echo "# Source: https://github.com/wlynxg/rule"
            echo ""
            echo "payload:"

            # Proxy rules
            if [ -s sources/proxy.txt ]; then
              echo "  # === Proxy ==="
              grep -v '^#' sources/proxy.txt | grep -v '^$' | sort -u | while read domain; do
                echo "  - DOMAIN-SUFFIX,$domain"
              done
            fi

            # Direct rules
            if [ -s sources/direct.txt ]; then
              echo "  # === Direct ==="
              grep -v '^#' sources/direct.txt | grep -v '^$' | sort -u | while read domain; do
                echo "  - DOMAIN-SUFFIX,$domain"
              done
            fi

            # Reject rules
            if [ -s sources/reject.txt ]; then
              echo "  # === Reject ==="
              grep -v '^#' sources/reject.txt | grep -v '^$' | sort -u | while read domain; do
                echo "  - DOMAIN-SUFFIX,$domain"
              done
            fi
          } > rule.yaml

          echo "=== Generated rule.yaml ==="
          cat rule.yaml

      - name: Commit to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          cp rule.yaml .
          git add .
          git commit -m "release: $(date -u +%Y%m%d-%H%M%S)"
          git push -f origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Rules
          make_latest: true
          files: rule.yaml
