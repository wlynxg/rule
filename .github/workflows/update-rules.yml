name: Build and Release Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate clean rule files
        run: |
          mkdir -p output
          for f in sources/*.txt; do
            name=$(basename "$f")
            grep -v '^#' "$f" | grep -v '^$' | sort -u > "output/$name"
            # Ensure file is not empty (GitHub requires size >= 1)
            if [ ! -s "output/$name" ]; then
              echo "# empty" > "output/$name"
            fi
          done
          echo "=== Generated files ==="
          for f in output/*; do echo "--- $f ---"; cat "$f"; done

      - name: Commit to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          cp output/* .
          git add .
          git commit -m "release: $(date -u +%Y%m%d-%H%M%S)"
          git push -f origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Rules
          make_latest: true
          files: output/*
