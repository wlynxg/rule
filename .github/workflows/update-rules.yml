name: Build and Release Rules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate combined rule file
        run: |
          OUTPUT="rule.yaml"
          echo "# Clash Rule Provider - Auto Generated" > "$OUTPUT"
          echo "# $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$OUTPUT"
          echo "# Source: https://github.com/${{ github.repository }}" >> "$OUTPUT"
          echo "" >> "$OUTPUT"
          echo "payload:" >> "$OUTPUT"

          for f in sources/*.txt; do
            name=$(basename "$f" .txt | tr '[:lower:]' '[:upper:]')
            rules=$(grep -v '^#' "$f" | grep -v '^$' | sort -u)
            if [ -n "$rules" ]; then
              echo "  # === $name ===" >> "$OUTPUT"
              echo "$rules" | while read -r domain; do
                # *.domain → DOMAIN-SUFFIX
                if [[ "$domain" == \** ]]; then
                  echo "  - DOMAIN-SUFFIX,${domain#\*.}" >> "$OUTPUT"
                else
                  echo "  - DOMAIN-SUFFIX,$domain" >> "$OUTPUT"
                fi
              done
            fi
          done

          # Ensure at least one payload entry
          if ! grep -q '^\s*- ' "$OUTPUT"; then
            echo "  - DOMAIN,placeholder.example.com" >> "$OUTPUT"
          fi

          echo "=== Generated ==="
          cat "$OUTPUT"

      - name: Commit to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf . 2>/dev/null || true
          cp rule.yaml .
          git add rule.yaml
          git commit -m "release: $(date -u +%Y%m%d-%H%M%S)"
          git push -f origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Rules
          make_latest: true
          files: rule.yaml
