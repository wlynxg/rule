name: Deploy Clash Rules to Gist

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GIST_TOKEN: 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

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: 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

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Clash rules
        run: python scripts/generate.py

      - name: Deploy to Gist
        run: |
          set -e

          PROXY_YAML=$(cat dist/proxy.yaml)
          DIRECT_YAML=$(cat dist/direct.yaml)
          REJECT_YAML=$(cat dist/reject.yaml)

          if [ -f .gist_id ]; then
            GIST_ID=$(cat .gist_id)
            echo "Updating Gist: $GIST_ID"
            curl -s -X PATCH "https://api.github.com/gists/$GIST_ID" \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "$(jq -n \
                --arg desc "Clash Rule Provider - Auto Updated" \
                --arg proxy "$PROXY_YAML" \
                --arg direct "$DIRECT_YAML" \
                --arg reject "$REJECT_YAML" \
                '{description:$desc,files:{"proxy.yaml":{content:$proxy},"direct.yaml":{content:$direct},"reject.yaml":{content:$reject}}}')"
          else
            echo "Creating new Gist..."
            RESPONSE=$(curl -s -X POST https://api.github.com/gists \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "$(jq -n \
                --arg desc "Clash Rule Provider - Auto Updated" \
                --arg proxy "$PROXY_YAML" \
                --arg direct "$DIRECT_YAML" \
                --arg reject "$REJECT_YAML" \
                '{description:$desc,public:true,files:{"proxy.yaml":{content:$proxy},"direct.yaml":{content:$direct},"reject.yaml":{content:$reject}}}')")
            GIST_ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "Created Gist: $GIST_ID"
            echo "$GIST_ID" > .gist_id
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .gist_id
            git commit -m "save gist id: $GIST_ID"
            git push
          fi

          echo ""
          echo "============================================"
          echo "  Proxy:  https://gist.githubusercontent.com/wlynxg/${GIST_ID}/raw/proxy.yaml"
          echo "  Direct: https://gist.githubusercontent.com/wlynxg/${GIST_ID}/raw/direct.yaml"
          echo "  Reject: https://gist.githubusercontent.com/wlynxg/${GIST_ID}/raw/reject.yaml"
          echo "============================================"
