name: Build and Release Rules

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京 06:00

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate clean rule files
        run: |
          mkdir -p output
          for f in sources/*.txt; do
            name=$(basename "$f")
            # 去掉注释和空行，排序去重
            grep -v '^#' "$f" | grep -v '^$' | sort -u > "output/$name"
          done
          echo "Generated rules:"
          wc -l output/*.txt

      - name: Commit to release branch
        run: |
          cp output/*.txt .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -f *.txt
          timestamp=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "release: $timestamp" || echo "No changes"
          git push -f origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rule-$(date -u '+%Y%m%d')
          name: Clash Rules $(date -u '+%Y-%m-%d')
          files: output/*.txt
          generate_release_notes: true
